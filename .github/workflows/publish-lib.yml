name: Publish Library

on:
  push:
    branches:
      - 'master'             # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:
    inputs:
      branch:
        description: 'Release branch name'
        required: false
        default: 'release'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push to the release branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git worktree works correctly

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish library
        run: bash scripts/publish-lib.sh origin ${{ inputs.branch || 'release' }}
