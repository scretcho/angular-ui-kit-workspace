<label class="uk-cb-label" [class.disabled]="isDisabled()">
  <span class="uk-cb-box-wrap">
    <input
      type="checkbox"
      class="uk-cb-native"
      [checked]="checked()"
      [indeterminate]="indeterminate()"
      [disabled]="isDisabled()"
      (change)="onToggle($event)"
    />
    <span class="uk-cb-box" [class.checked]="checked()" [class.indeterminate]="indeterminate()">
      @if (indeterminate()) { <span class="uk-cb-dash">—</span> }
      @else if (checked()) { <span class="uk-cb-check">✓</span> }
    </span>
  </span>
  @if (label()) {
    <span class="uk-cb-text">
      {{ label() }}
      @if (required()) { <span class="uk-required">*</span> }
    </span>
  }
</label>
@if (hint()) { <span class="uk-hint">{{ hint() }}</span> }
@if (errorMessage()) { <span class="uk-error">{{ errorMessage() }}</span> }
