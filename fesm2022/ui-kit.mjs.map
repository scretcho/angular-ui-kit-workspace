<div class="uk-rg-wrapper">
  @if (label) {
    <span class="uk-label">
      {{ label }}
      @if (required) { <span class="uk-required">*</span> }
    </span>
  }
  <div class="uk-rg-options" [class.horizontal]="direction === 'horizontal'">
    @for (opt of options; track opt.value) {
      <label
        class="uk-radio-label"
        [class.disabled]="isDisabled() || opt.disabled"
        [class.selected]="value() === opt.value"
      >
        <input
          type="radio"
          class="uk-radio-native"
          [name]="groupName"
          [value]="opt.value"
          [checked]="value() === opt.value"
          [disabled]="isDisabled() || !!opt.disabled"
          (change)="select(opt)"
        />
        <span class="uk-radio-circle">
          @if (value() === opt.value) {
            <span class="uk-radio-dot"></span>
          }
        </span>
        <span class="uk-radio-text">{{ opt.label }}</span>
      </label>
    }
  </div>
  @if (hint && !errorMessage) { <span class="uk-hint">{{ hint }}</span> }
  @if (errorMessage) { <span class="uk-error">{{ errorMessage }}</span> }
</div>
