<div class="uk-layout">
  <uk-header
    [title]="title()"
    [logo]="logo()"
    [actions]="headerActions()"
    [user]="user()"
    [sidebarCollapsed]="sidebarCollapsed()"
    (menuToggle)="toggleSidebar()"
    (actionClick)="headerActionClick.emit($event)"
    (userMenuClick)="userMenuClick.emit($event)"
  />

  <div class="uk-layout-body">
    <uk-sidebar
      [items]="navItems()"
      [activeId]="activeNavId()"
      [collapsed]="sidebarCollapsed()"
      [brandTitle]="title()"
      [brandLogo]="logo()"
      [brandRoute]="brandRoute()"
      (itemClick)="navItemClick.emit($event)"
      (collapsedChange)="sidebarCollapsed.set($event)"
    />

    <main class="uk-layout-content">
      <ng-content />
    </main>
  </div>
</div>
