<div class="uk-range-wrapper">
  @if (label()) {
    <div class="uk-range-header">
      <label class="uk-label">
        {{ label() }}
        @if (required()) { <span class="uk-required">*</span> }
      </label>
      @if (showValue()) {
        <span class="uk-range-val">
          @if (range()) { {{ lowValue() }} – {{ highValue() }} }
          @else { {{ value() }} }
          @if (unit()) { {{ unit() }} }
        </span>
      }
    </div>
  }
  <div class="uk-range-track-wrap" [class.disabled]="isDisabled()">
    @if (range()) {
      <input
        title="Minimum value"
        type="range"
        class="uk-range-input uk-range-low"
        [min]="min()" [max]="max()" [step]="step()"
        [value]="lowValue()"
        [disabled]="isDisabled()"
        (input)="onLowInput($event)"
      />
      <input
        title="Maximum value"
        type="range"
        class="uk-range-input uk-range-high"
        [min]="min()" [max]="max()" [step]="step()"
        [value]="highValue()"
        [disabled]="isDisabled()"
        (input)="onHighInput($event)"
      />
      <div class="uk-range-track">
        <div class="uk-range-fill" [style.left.%]="lowPercent()" [style.width.%]="highPercent() - lowPercent()"></div>
      </div>
    } @else {
      <input
        title="Select value"
        type="range"
        class="uk-range-input"
        [min]="min()" [max]="max()" [step]="step()"
        [value]="value()"
        [disabled]="isDisabled()"
        (input)="onInput($event)"
      />
      <div class="uk-range-track">
        <div class="uk-range-fill" [style.width.%]="valuePercent()"></div>
      </div>
    }
  </div>
  @if (showTicks()) {
    <div class="uk-range-ticks">
      <span>{{ min() }}</span>
      <span>{{ max() }}</span>
    </div>
  }
  @if (hint()) { <span class="uk-hint">{{ hint() }}</span> }
</div>
